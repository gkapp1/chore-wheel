<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Chore Wheel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <h1 class="title" id="appTitle">🍬 Chore Wheel 🍭</h1>

    <div class="kid-picker" id="kidPicker">
      <!-- kid buttons injected here -->
    </div>

    <div class="theme-picker">
      <label for="themeSelect">Theme:</label>
      <select id="themeSelect">
        <!-- theme options injected here -->
      </select>
    </div>

    <div class="wheel-wrap">
      <div class="pointer">▼</div>
      <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN!</button>

    <div class="status" id="status">Loading chores...</div>

    <div class="result-overlay" id="resultOverlay">
      <div class="result-card">
        <div class="result-emoji" id="resultEmoji">🍭</div>
        <div class="result-text" id="resultText">Chore</div>
        <button class="close-btn" id="closeResult">Yay!</button>
      </div>
    </div>

    <canvas id="confetti" class="confetti-canvas"></canvas>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
